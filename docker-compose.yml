services:
  backend:
    build: ./backend
    ports:
      - "5001:5001"
    environment:
      - BYBIT_API_KEY=${BYBIT_API_KEY}
      - BYBIT_API_SECRET=${BYBIT_API_SECRET}
      - BYBIT_TESTNET=${BYBIT_TESTNET:-false}
      - PORT=5001
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-}
      - ALLOWED_ORIGINS=http://localhost:3000

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5001
    ports:
      - "3000:3000"
    depends_on:
      - backend
